services:

  # ── Banco de dados ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Migrations (roda uma vez e sai) ────────────────────────────────────────
  migrate:
    image: node:20-slim
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
      - ./drizzle.config.js:/app/drizzle.config.js
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    command: sh -c "npm install --silent drizzle-kit drizzle-orm pg && npx drizzle-kit migrate"

  # ── Aplicação ──────────────────────────────────────────────────────────────
  app:
    image: ghcr.io/colaboradorleance/finanalytics:dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PORT: "3000"

volumes:
  postgres_data:
