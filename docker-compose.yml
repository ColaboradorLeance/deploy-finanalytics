services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/ferezinini/finanalytics:latest   # ← puxa do GHCR
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Sobrescreve DATABASE_URL usando as vars do .env para apontar para o db interno
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

  # Executa as migrations ANTES de subir o app (roda e sai)
  migrate:
    image: node:20-slim
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations
      - ./drizzle.config.minimal.ts:/app/drizzle.config.ts
      - ./package-migrate.json:/app/package.json
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
    command: sh -c "npm install --silent && npx drizzle-kit migrate"

volumes:
  postgres_data: